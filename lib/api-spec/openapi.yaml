openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SWAN GMAO API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard & KPIs
  - name: assets
    description: Asset management
  - name: workorders
    description: Work order management
  - name: preventive
    description: Preventive maintenance
  - name: inventory
    description: Inventory & spare parts
  - name: technicians
    description: Human resource management
  - name: reports
    description: Reports & analytics
  - name: sites
    description: Multi-site management
  - name: zones
    description: Zone management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard KPI stats
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/activity:
    get:
      operationId: getDashboardActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/chart-data:
    get:
      operationId: getDashboardChartData
      tags: [dashboard]
      summary: Get chart data for dashboard
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChartData"

  /assets:
    get:
      operationId: getAssets
      tags: [assets]
      summary: List all assets
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"
    post:
      operationId: createAsset
      tags: [assets]
      summary: Create a new asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetBody"
      responses:
        "201":
          description: Created asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"

  /assets/{id}:
    get:
      operationId: getAsset
      tags: [assets]
      summary: Get asset by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Asset details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
    put:
      operationId: updateAsset
      tags: [assets]
      summary: Update an asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetBody"
      responses:
        "200":
          description: Updated asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
    delete:
      operationId: deleteAsset
      tags: [assets]
      summary: Delete an asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /assets/{id}/workorders:
    get:
      operationId: getAssetWorkOrders
      tags: [assets]
      summary: Get work orders for an asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Work orders for asset
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkOrder"

  /assets/{id}/parts:
    get:
      operationId: getAssetParts
      tags: [assets]
      summary: Get spare parts catalog for an asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Asset parts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssetPart"
    post:
      operationId: createAssetPart
      tags: [assets]
      summary: Add a part to the asset parts catalog
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetPartBody"
      responses:
        "201":
          description: Created asset part
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetPart"

  /assets/{id}/parts/{partId}:
    put:
      operationId: updateAssetPart
      tags: [assets]
      summary: Update an asset part
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: partId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetPartBody"
      responses:
        "200":
          description: Updated asset part
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetPart"
    delete:
      operationId: deleteAssetPart
      tags: [assets]
      summary: Remove a part from the asset parts catalog
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: partId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /workorders:
    get:
      operationId: getWorkOrders
      tags: [workorders]
      summary: List all work orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of work orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkOrder"
    post:
      operationId: createWorkOrder
      tags: [workorders]
      summary: Create a new work order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkOrderBody"
      responses:
        "201":
          description: Created work order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"

  /workorders/{id}:
    get:
      operationId: getWorkOrder
      tags: [workorders]
      summary: Get work order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Work order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"
    put:
      operationId: updateWorkOrder
      tags: [workorders]
      summary: Update a work order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkOrderBody"
      responses:
        "200":
          description: Updated work order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"
    delete:
      operationId: deleteWorkOrder
      tags: [workorders]
      summary: Delete a work order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /workorders/{id}/parts:
    get:
      operationId: getWorkOrderParts
      tags: [workorders]
      summary: List parts used in a work order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of parts used
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkOrderPart"
    post:
      operationId: addWorkOrderPart
      tags: [workorders]
      summary: Add a part to a work order (deducts from inventory)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddWorkOrderPartBody"
      responses:
        "201":
          description: Part added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderPart"
        "400":
          description: Insufficient stock or invalid request

  /workorders/{id}/parts/{partId}:
    delete:
      operationId: removeWorkOrderPart
      tags: [workorders]
      summary: Remove a part from a work order (restores inventory)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: partId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Part removed

  /notifications:
    get:
      operationId: getNotifications
      tags: [dashboard]
      summary: Get live notifications (low stock, breakdowns, overdue plans)
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    put:
      operationId: markNotificationRead
      tags: [dashboard]
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    put:
      operationId: markAllNotificationsRead
      tags: [dashboard]
      summary: Mark all notifications as read
      responses:
        "200":
          description: Success

  /preventive:
    get:
      operationId: getPreventivePlans
      tags: [preventive]
      summary: List all preventive maintenance plans
      responses:
        "200":
          description: List of preventive plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PreventivePlan"
    post:
      operationId: createPreventivePlan
      tags: [preventive]
      summary: Create a preventive plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePreventivePlanBody"
      responses:
        "201":
          description: Created plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreventivePlan"

  /preventive/{id}:
    put:
      operationId: updatePreventivePlan
      tags: [preventive]
      summary: Update a preventive plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePreventivePlanBody"
      responses:
        "200":
          description: Updated plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreventivePlan"
    delete:
      operationId: deletePreventivePlan
      tags: [preventive]
      summary: Delete a preventive plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /preventive/{id}/execute:
    post:
      operationId: executePreventivePlan
      tags: [preventive]
      summary: Execute a preventive plan (creates WO + updates dates)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Work order created from plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"

  /inventory:
    get:
      operationId: getInventoryItems
      tags: [inventory]
      summary: List all inventory items
      parameters:
        - name: lowStock
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"
    post:
      operationId: createInventoryItem
      tags: [inventory]
      summary: Create an inventory item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInventoryItemBody"
      responses:
        "201":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /inventory/{id}:
    put:
      operationId: updateInventoryItem
      tags: [inventory]
      summary: Update an inventory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInventoryItemBody"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
    delete:
      operationId: deleteInventoryItem
      tags: [inventory]
      summary: Delete an inventory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /technicians:
    get:
      operationId: getTechnicians
      tags: [technicians]
      summary: List all technicians
      responses:
        "200":
          description: List of technicians
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Technician"
    post:
      operationId: createTechnician
      tags: [technicians]
      summary: Create a technician
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTechnicianBody"
      responses:
        "201":
          description: Created technician
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Technician"

  /technicians/{id}:
    put:
      operationId: updateTechnician
      tags: [technicians]
      summary: Update a technician
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTechnicianBody"
      responses:
        "200":
          description: Updated technician
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Technician"
    delete:
      operationId: deleteTechnician
      tags: [technicians]
      summary: Delete a technician
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /reports/kpis:
    get:
      operationId: getKpiReport
      tags: [reports]
      summary: Get MTBF, MTTR and availability KPIs
      responses:
        "200":
          description: KPI report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KpiReport"

  /reports/costs:
    get:
      operationId: getCostReport
      tags: [reports]
      summary: Get maintenance cost breakdown
      responses:
        "200":
          description: Cost report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostReport"

  /sites:
    get:
      operationId: getSites
      tags: [sites]
      summary: List all sites
      responses:
        "200":
          description: List of sites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Site"
    post:
      operationId: createSite
      tags: [sites]
      summary: Create a site
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSiteBody"
      responses:
        "201":
          description: Created site
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Site"

  /sites/{id}:
    put:
      operationId: updateSite
      tags: [sites]
      summary: Update a site
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSiteBody"
      responses:
        "200":
          description: Updated site
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Site"
    delete:
      operationId: deleteSite
      tags: [sites]
      summary: Delete a site
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /zones:
    get:
      operationId: getZones
      tags: [zones]
      summary: List all zones
      parameters:
        - name: siteId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of zones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Zone"
    post:
      operationId: createZone
      tags: [zones]
      summary: Create a zone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateZoneBody"
      responses:
        "201":
          description: Created zone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Zone"

  /zones/{id}:
    put:
      operationId: updateZone
      tags: [zones]
      summary: Update a zone
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateZoneBody"
      responses:
        "200":
          description: Updated zone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Zone"
    delete:
      operationId: deleteZone
      tags: [zones]
      summary: Delete a zone
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DashboardStats:
      type: object
      properties:
        totalAssets:
          type: integer
        activeWorkOrders:
          type: integer
        criticalAlerts:
          type: integer
        availabilityRate:
          type: number
        mtbf:
          type: number
        mttr:
          type: number
        lowStockItems:
          type: integer
        plannedMaintenanceThisMonth:
          type: integer
      required:
        - totalAssets
        - activeWorkOrders
        - criticalAlerts
        - availabilityRate
        - mtbf
        - mttr
        - lowStockItems
        - plannedMaintenanceThisMonth

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [workorder, alert, maintenance, inventory]
        message:
          type: string
        timestamp:
          type: string
        severity:
          type: string
          enum: [info, warning, critical, success]
        assetName:
          type: string
      required:
        - id
        - type
        - message
        - timestamp
        - severity

    ChartData:
      type: object
      properties:
        maintenanceByMonth:
          type: array
          items:
            type: object
            properties:
              month:
                type: string
              corrective:
                type: integer
              preventive:
                type: integer
            required: [month, corrective, preventive]
        assetsByCategory:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              count:
                type: integer
            required: [category, count]
        workOrdersByStatus:
          type: array
          items:
            type: object
            properties:
              status:
                type: string
              count:
                type: integer
            required: [status, count]
      required:
        - maintenanceByMonth
        - assetsByCategory
        - workOrdersByStatus

    Asset:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        serialNumber:
          type: string
        location:
          type: string
        status:
          type: string
          enum: [operational, maintenance, breakdown, decommissioned]
        manufacturer:
          type: string
        model:
          type: string
        installDate:
          type: string
        lastMaintenanceDate:
          type: string
        mtbf:
          type: number
        mttr:
          type: number
        availabilityRate:
          type: number
        criticality:
          type: string
          enum: [low, medium, high, critical]
        siteId:
          type: integer
        siteName:
          type: string
        zoneId:
          type: integer
        zoneName:
          type: string
        photoUrl:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - category
        - status
        - criticality
        - createdAt

    CreateAssetBody:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        serialNumber:
          type: string
        location:
          type: string
        status:
          type: string
          enum: [operational, maintenance, breakdown, decommissioned]
        manufacturer:
          type: string
        model:
          type: string
        installDate:
          type: string
        criticality:
          type: string
          enum: [low, medium, high, critical]
        siteId:
          type: integer
        zoneId:
          type: integer
        photoUrl:
          type: string
      required:
        - name
        - category
        - status
        - criticality

    AssetPart:
      type: object
      properties:
        id:
          type: integer
        assetId:
          type: integer
        inventoryItemId:
          type: integer
        partName:
          type: string
        reference:
          type: string
        quantity:
          type: number
        unit:
          type: string
        note:
          type: string
        createdAt:
          type: string
        inventoryItemName:
          type: string
        inventoryItemQuantity:
          type: integer
        inventoryItemUnit:
          type: string
      required:
        - id
        - assetId
        - partName
        - quantity
        - createdAt

    CreateAssetPartBody:
      type: object
      properties:
        inventoryItemId:
          type: integer
        partName:
          type: string
        reference:
          type: string
        quantity:
          type: number
        unit:
          type: string
        note:
          type: string
      required:
        - partName

    WorkOrder:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [corrective, preventive, predictive, inspection]
        priority:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
          enum: [open, in_progress, completed, cancelled, on_hold]
        assetId:
          type: integer
        assetName:
          type: string
        technicianId:
          type: integer
        technicianName:
          type: string
        estimatedHours:
          type: number
        actualHours:
          type: number
        scheduledDate:
          type: string
        completedDate:
          type: string
        siteId:
          type: integer
        siteName:
          type: string
        zoneId:
          type: integer
        zoneName:
          type: string
        assignmentMode:
          type: string
          enum: [by_technician, by_zone, by_machine, by_type]
        createdAt:
          type: string
      required:
