kind = "web"
previewPath = "/"
title = "Swan GMAO"
version = "1.0.0"
id = "artifacts/swan-gmao"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20580

[services.development]
run = "pnpm --filter @workspace/swan-gmao run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/swan-gmao", "run", "build" ]
publicDir = "artifacts/swan-gmao/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20580"
BASE_PATH = "/"
